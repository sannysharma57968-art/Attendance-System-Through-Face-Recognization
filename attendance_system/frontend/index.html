<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Smart Attendance</h2>
        <div class="dark-mode-wrap">
            <label class="dark-toggle" title="Toggle dark mode">
                <input type="checkbox" id="darkModeToggle" aria-label="Dark mode">
                <span class="dark-toggle-slider"></span>
            </label>
            <span class="dark-toggle-label">Dark</span>
        </div>
        <nav>
            <a href="index.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Live Dashboard
            </a>
            <a href="admin.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Admin Panel
            </a>
            <a href="documentation.html">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Documentation
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Live Monitoring</h1>
            <p id="datetime">Date: -- Time: --</p>
        </div>

        <div class="stats-row">
            <div class="stat-chip">
                <span class="stat-value" id="statTodayCount">0</span>
                <span class="stat-label">Present Today</span>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Live Camera Feed
                </h3>
                <div class="video-container">
                    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
                    <img src="/video_feed" alt="Video Stream">
                </div>
            </div>

            <div class="card">
                <h3>
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Attendance by Date
                </h3>
                <div class="toolbar">
                    <div class="form-group" style="margin-bottom: 0; max-width: 160px;">
                        <label for="attendanceDatePicker" class="sr-only">Date</label>
                        <input type="date" id="attendanceDatePicker" class="input-date">
                    </div>
                    <input type="text" id="searchAttendance" class="search-input" placeholder="Search by name" aria-label="Search by name">
                </div>
                <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                    <div class="table-wrap">
                        <table id="attendanceTable">
                            <thead>
                                <tr>
                                    <th class="sortable" data-sort="name">Name</th>
                                    <th class="sortable" data-sort="time">Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Rows added via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
